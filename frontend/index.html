<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- СТРАНИЦА АВТОРИЗАЦИИ (пока не залогинен)    -->
    <!-- ============================================ -->
    <div id="authPage" class="auth-page">
        <div class="auth-container">
            <h1>Messenger</h1>

            <!-- Вкладки: Вход / Регистрация -->
            <div class="tabs">
                <div id="tabLogin" class="tab active" onclick="showLoginForm(); clearAuthError();">Вход</div>
                <div id="tabRegister" class="tab" onclick="showRegisterForm(); clearAuthError();">Регистрация</div>
            </div>

            <!-- Ошибка авторизации -->
            <div id="authError" class="auth-error" style="display:none;"></div>

            <!-- Форма входа -->
            <div id="loginForm" class="auth-form">
                <input id="loginInput" type="text" placeholder="Логин" autocomplete="username">
                <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password">
                <button onclick="handleLogin()">Войти</button>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form" style="display:none;">
                <input id="regLoginInput" type="text" placeholder="Логин" autocomplete="off">
                <input id="regPasswordInput" type="password" placeholder="Пароль (мин. 4 символа)" autocomplete="new-password">
                <input id="regNameInput" type="text" placeholder="Имя" autocomplete="off">
                <input id="regSurnameInput" type="text" placeholder="Фамилия (опционально)" autocomplete="off">
                <button onclick="handleRegister()">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- ГЛАВНАЯ СТРАНИЦА                             -->
    <!-- ============================================ -->
    <div id="mainPage" class="main-page" style="display:none;">

        <!-- Шапка -->
        <div class="header">
            <span class="header-title">Messenger</span>
            <span id="userDisplayName" class="header-user">Пользователь</span>
            <span id="userCodeDisplay" class="header-usercode"></span>
            <button class="theme-btn" onclick="toggleTheme()" title="Переключить тему">☀</button>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <!-- Основной контент -->
        <div class="content">

            <!-- ======================================== -->
            <!-- ЛЕВАЯ ПАНЕЛЬ (список каналов)            -->
            <!-- ======================================== -->
            <div class="left-panel">
                <h2>Каналы</h2>

                <!-- Создание канала (сворачиваемое) -->
                <button class="toggle-btn" onclick="toggleCreateChannel()">+ Создать канал</button>
                <div id="createChannelPanel" class="create-channel" style="display:none;">
                    <input id="newChannelName" type="text" placeholder="Название">
                    <input id="newChannelDesc" type="text" placeholder="Описание">
                    <button onclick="createChannel()">Создать</button>
                    <button class="cancel-btn" onclick="toggleCreateChannel()">Отмена</button>
                </div>

                <!-- Поиск каналов -->
                <input id="channelSearch" type="text" class="search-input"
                       placeholder="Поиск каналов..." oninput="searchChannels()">

                <!-- Список каналов -->
                <div id="channelList" class="channel-list"></div>

                <!-- Пагинация каналов -->
                <div class="pagination">
                    <button onclick="prevChannelsPage()">←</button>
                    <span id="channelPageInfo">1</span>
                    <button onclick="nextChannelsPage()">→</button>
                </div>
            </div>

            <!-- ======================================== -->
            <!-- ПРАВАЯ ПАНЕЛЬ                            -->
            <!-- ======================================== -->
            <div class="right-panel">

                <!-- Приветствие (когда канал не выбран) -->
                <div id="welcomePanel" class="panel welcome-panel">
                    <h2>Добро пожаловать!</h2>
                    <p>Выберите канал слева, чтобы начать общение.</p>
                </div>

                <!-- Чат (когда выбран канал) -->
                <div id="rightPanel" class="panel right-content" style="display:none;">

                    <!-- Шапка чата: название + кнопка "О канале" -->
                    <div class="chat-header">
                        <h2 id="chatChannelName" class="chat-title">Канал</h2>
                        <button id="channelInfoBtn" class="info-btn">О канале</button>
                    </div>

                    <!-- Сообщения -->
                    <div id="messagesContainer" class="messages-container"></div>

                    <!-- Пагинация сообщений -->
                    <div class="pagination pagination-msg">
                        <button onclick="prevMessagesPage()">←</button>
                        <span id="messagesPageInfo">1</span>
                        <button onclick="nextMessagesPage()">→</button>
                    </div>

                    <!-- Панель отправки сообщения -->
                    <div class="message-input-area">
                        <textarea id="messageInput" class="message-input"
                                  placeholder="Введите сообщение..."
                                  onkeydown="handleMessageKey(event)"></textarea>
                        <button class="send-btn" onclick="sendMessage()">Отправить</button>
                    </div>
                </div>

                <!-- Страница "О канале" -->
                <div id="channelInfoPanel" class="panel channel-info-panel" style="display:none;">

                    <!-- Кнопка "Назад к чату" -->
                    <div class="info-header">
                        <button id="backToChatBtn" class="back-btn">← Назад к чату</button>
                    </div>

                    <h2>О канале</h2>

                    <!-- Основная информация -->
                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">Название:</span>
                            <span id="infoName" class="info-value"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Описание:</span>
                            <span id="infoDescription" class="info-value"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Дата создания:</span>
                            <span id="infoDate" class="info-value"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Владелец:</span>
                            <span id="infoOwner" class="info-value"></span>
                        </div>
                    </div>

                    <!-- Участники -->
                    <h3>Участники</h3>
                    <div id="membersList" class="members-list"></div>

                    <!-- Пагинация участников -->
                    <div class="pagination pagination-members">
                        <button onclick="prevMembersPage()">←</button>
                        <span id="membersPageInfo">1</span>
                        <button onclick="nextMembersPage()">→</button>
                    </div>

                    <!-- Инструменты владельца -->
                    <div id="ownerTools" class="owner-tools" style="display:none;">
                        <h3>Управление каналом</h3>

                        <!-- Редактирование -->
                        <div class="tool-section">
                            <h4>Редактировать канал</h4>
                            <input id="editName" type="text" placeholder="Название">
                            <input id="editDescription" type="text" placeholder="Описание">
                            <button onclick="updateChannel()">Сохранить</button>
                        </div>

                        <!-- Добавление участника -->
                        <div class="tool-section">
                            <h4>Добавить участника</h4>
                            <input id="addMemberInput" type="text" placeholder="Код пользователя">
                            <button onclick="addMember()">Добавить</button>
                        </div>

                        <!-- Удаление канала -->
                        <div class="tool-section">
                            <h4>Опасная зона</h4>
                            <button class="danger-btn" onclick="deleteCurrentChannel()">Удалить канал</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ                         -->
    <!-- ============================================ -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
